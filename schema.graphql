  """
  deleted: Boolean!
  id: ID!

  """
  A list of images related to a life cycle event
  """
  images(
    """
    Returns the elements in the list that come after the specified cursor.
    """
    after: String

    """
    Returns the elements in the list that come before the specified cursor.
    """
    before: String

    """
    Returns the first _n_ elements from the list.
    """
    first: Int

    """
    Returns the last _n_ elements from the list.
    """
    last: Int
  ): ImageConnection

  """
  Full text notes for a life cycle event
  """
  notes: String

  """
  The Specimen to which this life cycle event belongs
  """
  specimen: Specimen!

  """
  The date and time that the record was last updated
  """
  updatedAt: ISO8601DateTime!

  """
  The internal database ID for all life cycle events
  """
  uuid: ID!
}

