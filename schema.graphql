  Translated full text description of whether or not the variety can be used for fodder
  """
  usedForFodderNote: String

  """
  A translated description of the uses for a variety
  """
  uses: String
  varietyingInstructions: String @deprecated(reason: "Use plantingInstructions")
}

"""
Returns records based on visbility
"""
enum Visibility {
  """
  Request only records that have been soft-deleted
  """
  DELETED

  """
  Request only records that are drafts
  """
  DRAFT

  """
  Request only records that are private (usually just those owned by the current user)
  """
  PRIVATE

  """
  Request only records that are public
  """
  PUBLIC

  """
  Request public and private records
  """
  VISIBLE
}

"""
Notation of unique weather events affecting plants or planting
"""
type WeatherEvent implements LifeCycleEvent & Node {
  """
  Describes the quality or condition of weather for plants or planting - good,fair,poor
  """
