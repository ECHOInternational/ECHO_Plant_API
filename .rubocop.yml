inherit_from: .rubocop_todo.yml
AllCops:
    # Surface new cops in todo regeneration rather than silently ignoring them.
    NewCops: enable
    Exclude:
        - 'db/seeds.rb'
        # CI installs gems into vendor/bundle (in-repo for caching); never lint vendored code
        - 'vendor/**/*'
# Rspec doesn't support do...end so block delimiters must be allowed
Style/BlockDelimiters:
    Exclude:
      - 'spec/**/*.rb'
Lint/AmbiguousBlockAssociation:
    Exclude:
        - 'spec/**/*.rb'
Metrics/BlockLength:
    Exclude:
        - 'spec/**/*.rb'
        - 'db/schema.rb'
        - 'lib/tasks/ownership.rake'
Metrics/MethodLength:
    Exclude:
        - 'db/migrate/*.rb'
        - 'app/graphql/mutations/base_mutation.rb'
        - 'app/graphql/mutations/create_plant.rb'
Metrics/AbcSize:
    Exclude:
        - 'db/migrate/*.rb'
        - 'app/graphql/mutations/update_variety.rb'
        - 'app/graphql/mutations/update_location.rb'
        - 'app/graphql/mutations/update_category.rb'
        - 'app/graphql/types/me_type.rb'
        - 'app/graphql/mutations/base_mutation.rb'
        - 'app/graphql/mutations/create_location.rb'
        - 'app/graphql/mutations/create_category.rb'
        - 'app/services/ownership_backfill.rb'
        - 'spec/services/ownership_backfill_spec.rb'
Layout/LineLength:
    Exclude:
        - 'spec/**/*.rb'
        - 'db/migrate/*.rb'
Style/PercentLiteralDelimiters:
    Exclude:
        - 'db/migrate/20200702173418_create_versions.rb'
Style/NumericLiterals:
    Exclude:
        - 'db/schema.rb'
Style/WordArray:
    Exclude:
        - 'db/schema.rb'
Style/Documentation:
    Exclude:
        - 'db/migrate/*.rb'
Style/FrozenStringLiteralComment:
    Exclude:
        - 'db/migrate/*.rb'
        - 'db/schema.rb'
Layout/EmptyLinesAroundAttributeAccessor:
    Enabled: true
Layout/SpaceAroundMethodCallOperator:
    Enabled: true
Lint/BinaryOperatorWithIdenticalOperands:
    Enabled: true
Lint/DeprecatedOpenSSLConstant:
    Enabled: true
Lint/DuplicateElsifCondition:
    Enabled: true
Lint/DuplicateRescueException:
    Enabled: true
Lint/EmptyConditionalBody:
    Enabled: true
Lint/FloatComparison:
    Enabled: true
Lint/MissingSuper:
    Enabled: true
Lint/MixedRegexpCaptureTypes:
    Enabled: true
Lint/OutOfRangeRegexpRef:
    Enabled: true
Lint/RaiseException:
    Enabled: true
Lint/SelfAssignment:
    Enabled: true
Lint/StructNewOverride:
    Enabled: true
Lint/TopLevelReturnWithArgument:
    Enabled: true
Lint/UnreachableLoop:
    Enabled: true
Style/AccessorGrouping:
    Enabled: true
Style/ArrayCoercion:
    Enabled: true
Style/BisectedAttrAccessor:
    Enabled: true
Style/CaseLikeIf:
    Enabled: true
Style/ExplicitBlockArgument:
    Enabled: true
Style/ExponentialNotation:
    Enabled: true
Style/GlobalStdStream:
    Enabled: false
Style/HashAsLastArrayItem:
    Enabled: true
Style/HashEachMethods:
    Enabled: true
Style/HashLikeCase:
    Enabled: true
Style/HashTransformKeys:
    Enabled: true
Style/HashTransformValues:
    Enabled: true
Style/OptionalBooleanParameter:
    Enabled: true
Style/RedundantAssignment:
    Enabled: true
Style/RedundantFetchBlock:
    Enabled: true
    Exclude:
          - 'config/puma.rb'
Style/RedundantFileExtensionInRequire:
    Enabled: true
Style/RedundantRegexpCharacterClass:
    Enabled: true
Style/RedundantRegexpEscape:
    Enabled: true
Style/SingleArgumentDig:
    Enabled: true
Style/SlicingWithRange:
    Enabled: true
Style/StringConcatenation:
    Enabled: true