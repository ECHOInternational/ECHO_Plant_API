inherit_from: .rubocop_todo.yml
AllCops:
    # RuboCop 0.92 (frozen until the post-ladder tooling bump) cannot parse a
    # 3.1 .ruby-version and aborts if it auto-detects the runtime. Pin the target
    # to the highest version 0.92 supports so the linter keeps running unchanged;
    # this governs cop selection only, not the actual Ruby the app runs on (3.1).
    TargetRubyVersion: 2.7
    Exclude:
        - 'db/seeds.rb'
        # CI installs gems into vendor/bundle (in-repo for caching); never lint vendored code
        - 'vendor/**/*'
# RuboCop 0.92's Layout/BlockAlignment cop CRASHES (cop error -> exit 1 despite
# zero offenses) on 53 files when the runtime is Ruby 3.1 with parser 2.7.x.
# Disabled until the post-ladder RuboCop bump; re-enable it there together with
# removing the TargetRubyVersion pins.
Layout/BlockAlignment:
    Enabled: false
# Rspec doesn't support do...end so block delimiters must be allowed
Style/BlockDelimiters:
    Exclude:
      - 'spec/**/*.rb'
Lint/AmbiguousBlockAssociation:
    Exclude:
        - 'spec/**/*.rb'
Metrics/BlockLength:
    Exclude:
        - 'spec/**/*.rb'
        - 'db/schema.rb'
Metrics/MethodLength:
    Exclude:
        - 'db/migrate/*.rb'
Metrics/AbcSize:
    Exclude:
        - 'db/migrate/*.rb'
Layout/LineLength:
    Exclude:
        - 'spec/**/*.rb'
        - 'db/migrate/*.rb'
Style/PercentLiteralDelimiters:
    Exclude:
        - 'db/migrate/20200702173418_create_versions.rb'
Style/NumericLiterals:
    Exclude:
        - 'db/schema.rb'
Style/WordArray:
    Exclude:
        - 'db/schema.rb'
Style/Documentation:
    Exclude:
        - 'db/migrate/*.rb'
Style/FrozenStringLiteralComment:
    Exclude:
        - 'db/migrate/*.rb'
        - 'db/schema.rb'
Layout/EmptyLinesAroundAttributeAccessor:
    Enabled: true
Layout/SpaceAroundMethodCallOperator:
    Enabled: true
Lint/BinaryOperatorWithIdenticalOperands:
    Enabled: true
Lint/DeprecatedOpenSSLConstant:
    Enabled: true
Lint/DuplicateElsifCondition:
    Enabled: true
Lint/DuplicateRescueException:
    Enabled: true
Lint/EmptyConditionalBody:
    Enabled: true
Lint/FloatComparison:
    Enabled: true
Lint/MissingSuper:
    Enabled: true
Lint/MixedRegexpCaptureTypes:
    Enabled: true
Lint/OutOfRangeRegexpRef:
    Enabled: true
Lint/RaiseException:
    Enabled: true
Lint/SelfAssignment:
    Enabled: true
Lint/StructNewOverride:
    Enabled: true
Lint/TopLevelReturnWithArgument:
    Enabled: true
Lint/UnreachableLoop:
    Enabled: true
Style/AccessorGrouping:
    Enabled: true
Style/ArrayCoercion:
    Enabled: true
Style/BisectedAttrAccessor:
    Enabled: true
Style/CaseLikeIf:
    Enabled: true
Style/ExplicitBlockArgument:
    Enabled: true
Style/ExponentialNotation:
    Enabled: true
Style/GlobalStdStream:
    Enabled: false
Style/HashAsLastArrayItem:
    Enabled: true
Style/HashEachMethods:
    Enabled: true
Style/HashLikeCase:
    Enabled: true
Style/HashTransformKeys:
    Enabled: true
Style/HashTransformValues:
    Enabled: true
Style/OptionalBooleanParameter:
    Enabled: true
Style/RedundantAssignment:
    Enabled: true
Style/RedundantFetchBlock:
    Enabled: true
    Exclude:
          - 'config/puma.rb'
Style/RedundantFileExtensionInRequire:
    Enabled: true
Style/RedundantRegexpCharacterClass:
    Enabled: true
Style/RedundantRegexpEscape:
    Enabled: true
Style/SingleArgumentDig:
    Enabled: true
Style/SlicingWithRange:
    Enabled: true
Style/StringConcatenation:
    Enabled: true